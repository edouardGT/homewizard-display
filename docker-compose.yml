services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      - DB_PATH=/app/data/energy.db
    volumes:
      # Mount the DIRECTORY (WAL creates -wal/-shm files alongside the DB).
      - ./data:/app/data
    restart: unless-stopped
    expose:
      - "5050"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5050/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
